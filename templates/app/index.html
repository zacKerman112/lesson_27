<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій To-Do Менеджер</title>
    <!-- Підключення Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .completed { text-decoration: line-through; color: #6c757d; }
        .task-card { transition: 0.3s; }
        .task-card:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white py-3">
                    <h2 class="mb-0 text-center">Мій список справ</h2>
                </div>
                
                <div class="card-body">
                    <!-- Форма додавання -->
                    <form action="/" method="POST" class="mb-4">
                        <div class="input-group">
                            <input type="text" name="content" class="form-control" placeholder="Що потрібно зробити?" required>
                            <button type="submit" class="btn btn-success">Додати завдання</button>
                        </div>
                    </form>

                    <!-- Список завдань -->
                    {% if tasks %}
                        <ul class="list-group">
                            {% for task in tasks %}
                            <li class="list-group-item d-flex justify-content-between align-items-center task-card">
                                <span class="{{ 'completed' if task.completed else '' }}">
                                    {{ task.content }}
                                </span>
                                <div>
                                    <a href="/update/{{ task.id }}" 
                                       class="btn btn-sm {{ 'btn-secondary' if task.completed else 'btn-outline-success' }}">
                                        {{ 'Повернути' if task.completed else 'Виконати' }}
                                    </a>
                                    <a href="/delete/{{ task.id }}" class="btn btn-sm btn-outline-danger">Видалити</a>
                                </div>
                            </li>
                            {% endfor %}
                        </ul>
                    {% else %}
                        <p class="text-center text-muted">Список порожній. Додайте перше завдання!</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
